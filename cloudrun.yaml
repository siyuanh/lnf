# Cloud Run multi-container service: web (ingress) + api (sidecar) + sqlproxy.
#
# Render and deploy:
#   PROJECT_NUMBER=$(gcloud projects describe ubicame-sa --format='value(projectNumber)')
#   PROJECT_ID=ubicame-sa
#   REGION=southamerica-west1
#   TAG=v0.1.0
#   PUBLIC_URL=https://lnf-${PROJECT_NUMBER}.${REGION}.run.app
#   sed \
#     -e "s|__PROJECT_ID__|${PROJECT_ID}|g" \
#     -e "s|__PROJECT_NUMBER__|${PROJECT_NUMBER}|g" \
#     -e "s|__REGION__|${REGION}|g" \
#     -e "s|__TAG__|${TAG}|g" \
#     -e "s|__PUBLIC_URL__|${PUBLIC_URL}|g" \
#     cloudrun.yaml > /tmp/cloudrun.rendered.yaml
#   gcloud run services replace /tmp/cloudrun.rendered.yaml --region=${REGION}
#   gcloud run services add-iam-policy-binding lnf --region=${REGION} \
#     --member=allUsers --role=roles/run.invoker
#
# Sidecar discipline: only `web` declares ports — that's the ingress container.
# `api` and `sqlproxy` listen on 127.0.0.1 inside the shared netns and are
# unreachable from outside the service.

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: lnf
  labels:
    cloud.googleapis.com/location: __REGION__
spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/execution-environment: gen2
        run.googleapis.com/cpu-throttling: "false"
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "3"
    spec:
      serviceAccountName: __PROJECT_NUMBER__-compute@developer.gserviceaccount.com
      containerConcurrency: 80
      timeoutSeconds: 60
      containers:
        # ---------- ingress: Next.js web ----------
        - name: web
          image: __REGION__-docker.pkg.dev/__PROJECT_ID__/lnf/web:__TAG__
          ports:
            - name: http1
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          startupProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 0
            periodSeconds: 2
            failureThreshold: 30
            timeoutSeconds: 2

        # ---------- sidecar: Hono api ----------
        - name: api
          image: __REGION__-docker.pkg.dev/__PROJECT_ID__/lnf/api:__TAG__
          env:
            - name: NODE_ENV
              value: production
            - name: BETTER_AUTH_URL
              value: __PUBLIC_URL__
            - name: WEB_ORIGIN
              value: __PUBLIC_URL__
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: lnf-database-url
                  key: latest
            - name: BETTER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: lnf-better-auth-secret
                  key: latest
            - name: PARTNER_API_KEY_PEPPER
              valueFrom:
                secretKeyRef:
                  name: lnf-partner-pepper
                  key: latest
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          startupProbe:
            tcpSocket:
              port: 3001
            initialDelaySeconds: 0
            periodSeconds: 2
            failureThreshold: 30
            timeoutSeconds: 2

        # ---------- sidecar: Cloud SQL Auth Proxy ----------
        - name: sqlproxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.13.0
          args:
            - --port=5432
            - --address=0.0.0.0
            - __PROJECT_ID__:__REGION__:lnf-db
          resources:
            limits:
              cpu: "1"
              memory: 256Mi
