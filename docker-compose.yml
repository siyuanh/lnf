services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: lnf
      POSTGRES_PASSWORD: lnf_dev_password
      POSTGRES_DB: lnf_dev
    ports:
      - "5432:5432"
    volumes:
      - lnf_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lnf -d lnf_dev"]
      interval: 2s
      timeout: 2s
      retries: 20

volumes:
  lnf_db_data:
